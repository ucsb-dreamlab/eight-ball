<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magic Eight Ball</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Magic Eight Ball</h1>
        <div class="input-group">
            <input type="text" id="question-input" placeholder="Type your question here..." autocomplete="off">
        </div>
        <div id="eight-ball" class="eight-ball">
            <div class="inner-circle">
                <div id="display" class="display">
                    <div id="answer-triangle" class="answer-triangle">
                        <span id="answer-text">8</span>
                    </div>
                </div>
            </div>
        </div>
        <p class="instruction">Ask a question and click the ball!</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
